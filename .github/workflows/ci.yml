name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist/index.js)" ]; then
            echo "::error::dist/index.js is out of date. Run 'npm run build' and commit the result."
            git diff --stat dist/index.js
            exit 1
          fi
          echo "dist/ is up to date."
